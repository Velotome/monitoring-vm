services:
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana

  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - "./config/prometheus.yml:/etc/prometheus/prometheus.yml"

networks:
  monitoring:
      driver: bridge

volumes:
  grafana-storage: {}